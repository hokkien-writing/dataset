# Rime schema: hokkien_bp
# Generated from merged.csv - do not edit manually

schema:
  schema_id: hokkien_bp
  name: 福建話·拼音
  version: "20260430.220133"
  author:
    - Hokkien Writing Project(https://github.com/hokkien-writing)
  dependencies:
    - hokkien_bp_en
    - hokkien_bp_zh
    - luna_pinyin

switches:
  - name: ascii_punct
    reset: 0
    states: [ 。，, ．， ]
  - name: zh_simp
    states: [ 漢字, 汉字 ]
  - name: full_shape
    states: [ 半角, 全角 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - lua_processor@bp_caps_tracker
    - speller
    - punctuator
    - selector
    - navigator
    - key_binder
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@en_lookup
    - affix_segmentor@zh_lookup
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - reverse_lookup_translator
    - table_translator@en_lookup
    - table_translator@zh_lookup
  filters:
    - simplifier
    - lua_filter@bp_filter
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA12345678-!~`
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " -"
  algebra:
    - xform/^g/gg/
    - xform/^b/bb/
    - xform/^j/zz/
    - xform/^chh/c/
    - xform/^ch/z/
    - xform/^k(?=[^h])/g/
    - xform/^kh/k/
    - xform/^p(?=[^h])/b/
    - xform/^ph/p/
    - xform/^t(?=[^h])/d/
    - xform/^th/t/
    - xform/ou/oo/
    - xform/^n(?=[^g])/ln/
    - xform/([aeiou]+)nnh(\d)$/n$1h$2/
    - xform/([aeiou]+)nn(\d)$/n$1$2/
    - xform/^ng/ggn/
    - xform/^m/bbn/
    - derive/ /-/
    - derive/[1-8]//
    - derive/a/A/
    - derive/b/B/
    - derive/c/C/
    - derive/d/D/
    - derive/e/E/
    - derive/f/F/
    - derive/g/G/
    - derive/h/H/
    - derive/i/I/
    - derive/j/J/
    - derive/k/K/
    - derive/l/L/
    - derive/m/M/
    - derive/n/N/
    - derive/o/O/
    - derive/p/P/
    - derive/q/Q/
    - derive/r/R/
    - derive/s/S/
    - derive/t/T/
    - derive/u/U/
    - derive/v/V/
    - derive/w/W/
    - derive/x/X/
    - derive/y/Y/
    - derive/z/Z/
    - abbrev/^([a-z]).+$/$1/

menu:
  page_size: 6

key_binder:
  import_preset: default
  bindings:
    - { when: paging, accept: Left, send: Page_Up }
    - { when: has_menu, accept: Right, send: Page_Down }
    - { when: paging, accept: bracketleft, send: Page_Up }
    - { when: has_menu, accept: bracketright, send: Page_Down }
    - { when: has_menu, accept: Tab, send: Page_Down }
    - { when: paging, accept: Shift+Tab, send: Page_Up }
    - { when: always, accept: Control+Shift+4, toggle: zh_simp }
    - { when: always, accept: Control+Shift+dollar, toggle: zh_simp }
    - { when: always, accept: Control+period, toggle: ascii_punct }

simplifier:
  opencc_config: t2s.json
  option_name: zh_simp
  tips: char

style:
  horizontal: true
  candidate_list_layout: linear
  candidate_format: "%@"

translator:
  dictionary: hokkien_bp
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  spelling_hints: 99

reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  suffix: "'"
  tips: "〔普通話拼音反查〕"


en_lookup:
  tag: en_lookup
  dictionary: hokkien_bp_en
  prefix: "~"
  suffix: "'"
  tips: "〔English〕"

zh_lookup:
  tag: zh_lookup
  dictionary: hokkien_bp_zh
  enable_completion: true
  prefix: "!"
  suffix: "'"
  tips: "〔普通話對照〕"
  preedit_format:
    - xform/([nljqxy])v/$1ü/

recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
    en_lookup: "~[a-z]*'?$"
    zh_lookup: "![a-z]*'?$"
    reverse_lookup: "`[a-z]*'?$"

abc_segmentor:
  extra_tags:
    - reverse_lookup
    - en_lookup
    - zh_lookup

punctuator:
  full_shape:
    ' ': { commit: '　' }
    ',': { commit: ， }
    '.': { commit: 。 }
    '<': [ 《, 〈, «, ‹ ]
    '>': [ 》, 〉, », › ]
    '/': [ ／, ÷ ]
    '?': { commit: ？ }
    ';': { commit: ； }
    ':': { commit: ： }
    '''': { pair: [ '‘', '’' ] }
    '"': { pair: [ '“', '”' ] }
    '\': [ 、, ＼ ]
    '|': [ ·, ｜, '§', '¦' ]
    '`': ｀
    '~': ～
    '!': { commit: ！ }
    '@': [ ＠, ☯ ]
    '#': [ ＃, ⌘ ]
    '%': [ ％, '°', '℃' ]
    '$': [ ￥, '$', '€', '£', '¥', '¢', '¤' ]
    '^': { commit: …… }
    '&': ＆
    '*': [ ＊, ·, ・, ×, ※, ❂ ]
    '(': （
    ')': ）
    '-': －
    '_': ——
    '+': ＋
    '=': ＝
    '[': [ 「, 【, 〔, ［ ]
    ']': [ 」, 】, 〕, ］ ]
    '{': [ 『, 〖, ｛ ]
    '}': [ 』, 〗, ｝ ]
  half_shape:
    ',': ，
    '.': 。
    '<': 《
    '>': 》
    '/': '/'
    '?': ？
    ';': ；
    ':': ：
    '''': { pair: [ '‘', '’' ] }
    '"': { pair: [ '“', '”' ] }
    '\': 、
    '|': '|'
    '`': '`'
    '~': '~'
    '!': ！
    '@': '@'
    '#': '#'
    '%': '%'
    '$': '¥'
    '^': ……
    '&': '&'
    '*': '*'
    '(': （
    ')': ）
    '-': '-'
    '_': ——
    '+': '+'
    '=': '='
    '[': 【
    ']': 】
    '{': 「
    '}': 」
